<!--
    Halaman Login Otentikasi PrivateCam.
    Menyediakan antarmuka form bagi administrator untuk memasukkan kredensial (admin/password)
    dan memverifikasinya ke backend guna mendapatkan cookie sesi.
-->
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrivateCam - Masuk Dasbor</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    <div class="login-container-card">
        <div class="login-header">
            <span class="pulse-icon"></span>
            <h1>Private<span class="text-accent">Cam</span></h1>
            <p>Silakan masuk untuk mengakses monitoring CCTV</p>
        </div>

        <form id="loginForm" class="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required placeholder="Masukkan username" autocomplete="username">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Masukkan password" autocomplete="current-password">
            </div>

            <div class="error-box hidden" id="errorBox">
                Username atau password salah!
            </div>

            <button type="submit" class="btn btn-primary btn-block" id="btnLogin">
                Masuk Ke Dasbor
            </button>
        </form>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const errorBox = document.getElementById('errorBox');
        const btnLogin = document.getElementById('btnLogin');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorBox.classList.add('hidden');
            btnLogin.disabled = true;
            btnLogin.textContent = 'Memverifikasi...';

            const username = usernameInput.value;
            const password = passwordInput.value;

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    // Login sukses, redirect ke dasbor utama
                    window.location.href = '/';
                } else {
                    const data = await response.json().catch(() => ({}));
                    errorBox.textContent = data.message || 'Username atau password salah!';
                    errorBox.classList.remove('hidden');
                    btnLogin.disabled = false;
                    btnLogin.textContent = 'Masuk Ke Dasbor';
                }
            } catch (err) {
                errorBox.textContent = 'Gagal terhubung ke server!';
                errorBox.classList.remove('hidden');
                btnLogin.disabled = false;
                btnLogin.textContent = 'Masuk Ke Dasbor';
            }
        });
    </script>
</body>
</html>
