; /firmware/platformio.ini
; =========================================================================
; Berkas Konfigurasi Proyek PlatformIO - Firmware ESP32-CAM.
; Mendefinisikan platform espressif32, board esp32cam, framework arduino,
; dan kecepatan baud rate untuk monitoring Serial.
; =========================================================================


[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200

; =========================================================================
; Konfigurasi Port Upload & Serial Monitor (Opsional)
; Hapus tanda titik koma (;) di bawah ini jika ingin menentukan port secara manual.
; Pada Windows gunakan COMx (e.g. COM3), pada Linux/macOS gunakan /dev/ttyUSB0 atau sejenisnya.
; =========================================================================
upload_port = COM7
