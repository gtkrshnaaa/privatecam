# /docker-compose.yml
# =========================================================================
# Konfigurasi Docker Compose untuk Deployment Server PrivateCam.
# Memetakan port kontainer internal 8080 ke port host eksternal 49111,
# mengatur nama kontainer, zona waktu lokal, persistensi data SQLite,
# dan menerapkan kebijakan restart otomatis.
# =========================================================================
version: '3.8'

services:
  privatecam:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: privatecam-cctv
    ports:
      - "49111:8080"
    restart: always
    environment:
      - TZ=Asia/Jakarta
      - DB_PATH=/app/data/privatecam.db
    volumes:
      - privatecam-data:/app/data

volumes:
  privatecam-data:
    driver: local
