# =========================================================================
# Konfigurasi Docker Compose untuk Deployment Server PrivateCam.
# Memetakan port kontainer internal 8080 ke port host eksternal 49111,
# mengatur nama kontainer, zona waktu lokal, dan menerapkan kebijakan restart otomatis.
# =========================================================================
version: '3.8'

services:
  privatecam:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: privatecam-cctv
    ports:
      - "49111:8080"
    restart: always
    environment:
      - TZ=Asia/Jakarta
